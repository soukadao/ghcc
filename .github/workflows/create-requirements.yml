name: Create Requirements
on:
  issues:
    types: [labeled]
jobs:
  create_requirements:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'doc:requirements'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Requirements Issue
        id: claude
        uses: anthropics/claude-code-action@v1.0.70
        with:
          prompt: |
            You are a requirements analyst. Analyze the following GitHub issue and refine it based on these rules:

            ### If the issue content is abstract or ambiguous:
            1. Extract the core concept and purpose.
            2. Identify missing information from the following perspectives and return a list of items that need clarification:
              - Target: What is being changed?
              - Purpose: Why is this change needed?
              - Scope: What is included and what is not?
              - Acceptance criteria: What defines completion?
              - Constraints: Are there any technical or time constraints?
            3. Update the issue body with the clarification questions appended.

            ### If the issue content is already specific and detailed:
            1. Verify there are no contradictions or duplications between requirements.
            2. Proofread and refine wording for clarity and consistency.
            3. Organize requirements logically.
            4. Ensure each requirement meets the following conditions:
              - Clear and unambiguous
              - Testable
              - Properly formatted
            5. Fix any grammatical or structural issues.
            6. Update the issue body with the refined requirements.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            update issue command: gh issue edit ${{ github.event.issue.number }} --body "$BODY"

          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools 'Bash(gh issue edit:*)'"
